<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Run and Gun Prototype</title>
  <style>
    body { margin:0; background:#222; overflow:hidden; }
    canvas { display:block; margin:0 auto; background:#444; }
  </style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- Player ---
const player = {
  x: 100, y: 300, w: 40, h: 60,
  vy: 0, speed: 5, jumpForce: 12,
  grounded: false, bullets: []
};

// --- Enemies ---
let enemies = [
  {x:600, y:300, w:40, h:60, health:50},
  {x:700, y:300, w:40, h:60, health:50}
];

// --- Controls ---
const keys = {};
document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

// --- Game Loop ---
function update(){
  // Movimiento
  if(keys["ArrowRight"]) player.x += player.speed;
  if(keys["ArrowLeft"]) player.x -= player.speed;

  // Salto
  if(keys["Space"] && player.grounded){
    player.vy = -player.jumpForce;
    player.grounded = false;
  }

  // Física
  player.vy += 0.6; // gravedad
  player.y += player.vy;
  if(player.y >= 300){
    player.y = 300;
    player.vy = 0;
    player.grounded = true;
  }

  // Disparo
  if(keys["KeyZ"]){
    if(player.bullets.length === 0 || Date.now() - player.bullets[player.bullets.length-1].time > 300){
      player.bullets.push({x:player.x+player.w, y:player.y+player.h/2, w:10, h:4, speed:8, time:Date.now()});
    }
  }

  // Actualizar balas
  player.bullets.forEach(b => b.x += b.speed);

  // Colisiones con enemigos
  player.bullets.forEach(b=>{
    enemies.forEach(e=>{
      if(b.x < e.x+e.w && b.x+b.w > e.x && b.y < e.y+e.h && b.y+b.h > e.y){
        e.health -= 10;
        b.x = canvas.width+100; // eliminar bala
      }
    });
  });

  enemies = enemies.filter(e=>e.health>0);

  draw();
  requestAnimationFrame(update);
}

// --- Draw ---
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Player
  ctx.fillStyle="cyan";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // Bullets
  ctx.fillStyle="yellow";
  player.bullets.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));

  // Enemies
  ctx.fillStyle="red";
  enemies.forEach(e=>ctx.fillRect(e.x,e.y,e.w,e.h));

  // HUD
  ctx.fillStyle="white";
  ctx.font="16px Arial";
  ctx.fillText("Enemigos restantes: "+enemies.length, 10,20);
}

update();
</script>
</body>
</html>
